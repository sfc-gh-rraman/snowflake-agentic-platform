agent_capability_schema:
  type: object
  required:
    - agent_id
    - name
    - version
    - description
    - capabilities
  properties:
    agent_id:
      type: string
      description: Unique identifier for the agent
      pattern: "^[a-z][a-z0-9_]*$"
    
    name:
      type: string
      description: Human-readable agent name
      maxLength: 100
    
    version:
      type: string
      description: Semantic version (e.g., 1.0.0)
      pattern: "^\\d+\\.\\d+\\.\\d+$"
    
    description:
      type: string
      description: Detailed description of agent purpose and capabilities
      maxLength: 2000
    
    category:
      type: string
      enum:
        - discovery
        - preprocessing
        - validation
        - ml
        - search
        - semantic
        - app_generation
        - deployment
        - observability
    
    capabilities:
      type: array
      items:
        type: object
        required:
          - capability_id
          - name
          - input_types
          - output_types
        properties:
          capability_id:
            type: string
            description: Unique capability identifier
          name:
            type: string
            description: Capability name
          description:
            type: string
            description: What this capability does
          input_types:
            type: array
            items:
              type: string
            description: Accepted input types (e.g., parquet, csv, pdf, table)
          output_types:
            type: array
            items:
              type: string
            description: Produced output types
          constraints:
            type: object
            description: Any constraints (max_size, required_columns, etc.)
    
    dependencies:
      type: array
      items:
        type: object
        required:
          - agent_id
          - relationship
        properties:
          agent_id:
            type: string
            description: ID of dependent agent
          relationship:
            type: string
            enum:
              - requires
              - optional
              - conflicts
          description:
            type: string
    
    triggers:
      type: array
      items:
        type: object
        required:
          - condition
          - priority
        properties:
          condition:
            type: string
            description: Condition that triggers this agent (e.g., "input_type == 'parquet'")
          priority:
            type: integer
            description: Priority when multiple agents match (higher = more priority)
            minimum: 0
            maximum: 100
          description:
            type: string
    
    config_schema:
      type: object
      description: JSON Schema for agent configuration
    
    state_machine:
      type: object
      description: LangGraph state machine definition
      properties:
        states:
          type: array
          items:
            type: string
        initial_state:
          type: string
        transitions:
          type: array
          items:
            type: object
            properties:
              from:
                type: string
              to:
                type: string
              condition:
                type: string

chunk_schema:
  description: Schema for agent capability chunks indexed by Cortex Search
  properties:
    chunk_id:
      type: string
    agent_id:
      type: string
    agent_name:
      type: string
    agent_version:
      type: string
    category:
      type: string
    capability_id:
      type: string
    capability_name:
      type: string
    chunk_text:
      type: string
      description: Searchable text combining agent and capability descriptions
    input_types:
      type: array
      items:
        type: string
    output_types:
      type: array
      items:
        type: string
    full_definition:
      type: object
      description: Complete agent definition for retrieval
