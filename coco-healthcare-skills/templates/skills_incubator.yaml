profile:
  name: health-sciences-incubator
  description: >-
    Health Sciences incubator profile for experimental skill development on Snowflake.
    Orchestrates skills across medical imaging, clinical data, drug safety, claims/RWE,
    genomics, and lab data. Includes experimental and in-development skills.
    Triggers: healthcare, clinical, EHR, FHIR, HL7, DICOM, imaging, radiology,
    patient data, HIPAA, PHI, claims, RWE, pharmacovigilance, drug safety,
    clinical trial, FAERS, genomics, variant, single-cell, RNA-seq, bioinformatics,
    OMOP, CDM, NLP, clinical notes, lab instrument, Allotrope, survival analysis,
    Kaplan-Meier, scvi-tools, nextflow, nf-core, React, dashboard, clinical app,
    patient portal, healthcare UI, PubMed, biomedical literature, CKE,
    knowledge extension, ClinicalTrials.gov, trial search, literature review.
  title: Health Sciences Incubator Profile
  intro: >-
    You are a **Health Sciences Solutions Architect** working in the incubator
    environment. You have access to all skills -- including experimental and
    in-development skills -- for rapid prototyping and customer demos. Skills
    in this environment may be rough or evolving. Always validate outputs.

skills:
  hcls-provider-imaging:
    triggers: "DICOM, radiology, imaging, PACS, modality, CT, MR, XR"
    description: "Router: detects intent and routes to sub-skills"
    domain: "Provider > Clinical Research"
    sub_skills:
      - name: dicom-parser
        triggers: "Parse DICOM, extract tags, DICOM schema, pydicom"
        description: "18-table DICOM data model + pydicom parser"
      - name: dicom-ingestion
        triggers: "Ingest DICOM, imaging pipeline, load images, stage"
        description: "Stages, COPY, Dynamic Tables, Streams/Tasks"
      - name: dicom-analytics
        triggers: "Imaging analytics, radiology NLP, report extraction"
        description: "Cortex AI NLP on reports, Cortex Search"
      - name: imaging-viewer
        triggers: "Imaging viewer, Streamlit imaging, DICOM dashboard"
        description: "Streamlit dashboard + SPCS pixel viewer"
      - name: imaging-governance
        triggers: "HIPAA imaging, PHI masking, imaging audit"
        description: "Masking policies, classification, row-access"
      - name: imaging-ml
        triggers: "Imaging model, radiology AI, pathology model"
        description: "ML training, Model Registry, SQL inference"
      - name: data-model-knowledge
        triggers: "DICOM data model, schema reference, model repository"
        description: "18-table DICOM data model reference docs"

  hcls-provider-imaging-dicom-parser:
    triggers: "Parse DICOM standalone (without router)"
    description: "Standalone DICOM parser for quick parsing tasks"
    domain: "Provider > Clinical Research"
    standalone: true

  hcls-provider-cdata-fhir:
    triggers: "FHIR, HL7, Patient resource, Observation, Bundle, ndjson"
    description: "FHIR R4 resources to relational tables"
    domain: "Provider > Clinical Data Management"

  hcls-provider-cdata-clinical-nlp:
    triggers: "Clinical NLP, NER, clinical notes, discharge summary, ICD coding"
    description: "Structured extraction from clinical text"
    domain: "Provider > Clinical Data Management"

  hcls-provider-cdata-omop:
    triggers: "OMOP, CDM, OHDSI, observational research, vocabulary mapping"
    description: "EHR/claims to OMOP CDM v5.4"
    domain: "Provider > Clinical Data Management"

  hcls-provider-cdata-clinical-docs:
    triggers: "clinical document, document extraction, PDF extraction, discharge summary extraction, pathology report extraction, radiology report extraction, clinical docs pipeline, AI_PARSE_DOCUMENT, AI_EXTRACT, AI_AGG, document classification, clinical search, clinical agent, clinical document viewer"
    description: "Router: clinical document intelligence with defense-in-depth guardrails (extraction, search, agent, viewer)"
    domain: "Provider > Clinical Data Management"
    sub_skills:
      - name: clinical-document-extraction
        triggers: "extract, parse, pipeline, classify documents, ingest, process documents"
        description: "Phased extraction: gates -> classify -> extract -> parse-and-refresh"
      - name: clinical-docs-search
        triggers: "search documents, find in documents, Cortex Search clinical"
        description: "Cortex Search Service over parsed clinical content"
      - name: clinical-docs-agent
        triggers: "clinical agent, natural language query, Cortex Agent clinical, semantic view clinical"
        description: "Cortex Agent combining Analyst (Semantic View) + Search"
      - name: clinical-docs-viewer
        triggers: "document viewer, clinical dashboard, Streamlit clinical viewer"
        description: "Streamlit document viewer (delegates to developing-with-streamlit)"
      - name: data-model-knowledge
        triggers: "clinical data model, schema reference, table structure clinical"
        description: "Cortex Search over schema metadata"

  hcls-provider-claims-data-analysis:
    triggers: "Claims data, RWE, 837, 835, medical claims, utilization, HEDIS"
    description: "Cohort building, utilization, treatment patterns"
    domain: "Provider > Revenue Cycle"

  hcls-pharma-dsafety-pharmacovigilance:
    triggers: "FAERS, adverse events, drug safety, ADR, signal detection, MedDRA"
    description: "FDA FAERS signal detection with disproportionality metrics"
    domain: "Pharma > Drug Safety"

  hcls-pharma-dsafety-clinical-trial-protocol:
    triggers: "Clinical trial protocol, generate protocol, FDA submission"
    description: "Protocol generation using waypoint architecture"
    domain: "Pharma > Drug Safety"

  hcls-pharma-genomics-nextflow:
    triggers: "nf-core, Nextflow, FASTQ, variant calling, gene expression, GEO"
    description: "nf-core pipelines (rnaseq, sarek, atacseq)"
    domain: "Pharma > Genomics"

  hcls-pharma-genomics-variant-annotation:
    triggers: "VCF annotation, ClinVar, gnomAD, pathogenic variants, ACMG"
    description: "Variant annotation with ClinVar/gnomAD"
    domain: "Pharma > Genomics"

  hcls-pharma-genomics-single-cell-qc:
    triggers: "QC, single-cell, scRNA-seq, scanpy, MAD-based filtering"
    description: "Automated QC for scRNA-seq data"
    domain: "Pharma > Genomics"

  hcls-pharma-genomics-scvi-tools:
    triggers: "scVI, scANVI, totalVI, batch correction, data integration"
    description: "Deep learning single-cell analysis"
    domain: "Pharma > Genomics"

  hcls-pharma-genomics-survival-analysis:
    triggers: "Survival analysis, Kaplan-Meier, Cox regression, hazard ratio"
    description: "Time-to-event analysis with publication-ready plots"
    domain: "Pharma > Genomics"

  hcls-pharma-lab-allotrope:
    triggers: "Instrument files, standardize lab data, Allotrope, ASM, LIMS"
    description: "Lab instrument outputs to Allotrope JSON/CSV"
    domain: "Pharma > Lab Operations"

  hcls-cross-research-problem-selection:
    triggers: "Research problem, project ideation, evaluate project, scientific decisions"
    description: "Scientific problem selection using Fischbach & Walsh methodology"
    domain: "Cross-Industry > Research Strategy"

  hcls-cross-validation:
    triggers: "validate, data quality, completeness check, schema validation, semantic check, QA, conformance, data integrity, verify pipeline output"
    description: "Cross-cutting data validation (completeness, schema, semantic) for FHIR/OMOP/DICOM/clinical docs"
    domain: "Cross-Industry > Validation"

  hcls-cross-cke-pubmed:
    triggers: "PubMed, biomedical literature, drug mechanism, clinical evidence, research papers"
    description: "PubMed biomedical literature search"
    domain: "Cross-Industry > Knowledge Extensions"
    cke: true
    data_source: "PubMed biomedical literature"
    used_by:
      - hcls-pharma-dsafety-pharmacovigilance
      - hcls-provider-cdata-clinical-nlp
      - hcls-cross-research-problem-selection
      - "hcls-provider-imaging (dicom-analytics)"
      - hcls-provider-cdata-clinical-docs
    invoke_when: "Drug-event associations, radiology research, clinical NLP context, research landscape review, clinical document grounding"

  hcls-cross-cke-clinical-trials:
    triggers: "ClinicalTrials.gov, trial search, trial design, similar trials, feasibility, eligibility criteria"
    description: "ClinicalTrials.gov research database"
    domain: "Cross-Industry > Knowledge Extensions"
    cke: true
    data_source: "ClinicalTrials.gov registry"
    used_by:
      - hcls-pharma-dsafety-clinical-trial-protocol
      - hcls-provider-claims-data-analysis
      - hcls-pharma-genomics-survival-analysis
    invoke_when: "Trial design benchmarking, feasibility analysis, eligibility criteria, endpoint definitions"

overlaps:
  - skill: hcls-provider-claims-data-analysis
    serves: "Provider (revenue cycle) and Payer (claims processing)"
  - skill: hcls-pharma-genomics-survival-analysis
    serves: "Pharma (clinical outcomes) and Provider (clinical research)"
  - skill: hcls-provider-cdata-clinical-nlp
    serves: "Provider (EHR extraction) and Pharma (safety narrative mining)"
  - skill: hcls-provider-cdata-clinical-docs
    overlaps_with: hcls-provider-cdata-clinical-nlp
    resolution: >-
      clinical-nlp = text-only NER/entity extraction from clinical notes (no document pipeline).
      clinical-docs = full document pipeline (PDF/DOCX -> AI_PARSE_DOCUMENT + AI_EXTRACT + AI_AGG -> Search/Agent/Viewer).
      Route "discharge summary extraction from PDF" to clinical-docs.
      Route "extract entities from clinical text" to clinical-nlp.

patterns:
  - name: "Imaging + Clinical Integration"
    steps:
      - skill: hcls-provider-imaging
        note: "(dicom-parser) > build imaging metadata tables"
      - skill: hcls-provider-cdata-fhir
        note: "> ingest FHIR DiagnosticReport/ImagingStudy"
      - skill: hcls-provider-cdata-clinical-nlp
        note: "> extract findings from radiology reports"
      - skill: hcls-cross-cke-pubmed
        note: "> enrich with radiology research context"
      - note: "Platform: `developing-with-streamlit` or `build-react-app` for UI"

  - name: "Clinical Data Warehouse (OMOP)"
    steps:
      - skill: hcls-provider-cdata-fhir
        note: "> ingest FHIR bundles"
      - skill: hcls-provider-cdata-omop
        note: "> transform to OMOP CDM"
      - note: "Platform: `sensitive-data-classification`, `data-policy` > HIPAA governance"
      - platform: "semantic-view-optimization > semantic views for analytics"

  - name: "Drug Safety Signal Detection"
    steps:
      - skill: hcls-pharma-dsafety-pharmacovigilance
        note: "> load and analyze FAERS data"
      - skill: hcls-cross-cke-pubmed
        note: "> search literature for known drug-event associations"
      - skill: hcls-provider-cdata-clinical-nlp
        note: "> extract adverse events from narrative text"
      - skill: hcls-provider-claims-data-analysis
        note: "> correlate with claims-based utilization"

  - name: "Genomics + Clinical Outcomes"
    steps:
      - skill: hcls-pharma-genomics-nextflow
        note: "> run nf-core pipeline on sequencing data"
      - skill: hcls-pharma-genomics-variant-annotation
        note: "> annotate variants with ClinVar/gnomAD"
      - skill: hcls-pharma-genomics-survival-analysis
        note: "> correlate variants with patient outcomes"
      - platform: "machine-learning > train predictive models"

  - name: "Single-Cell Analysis Pipeline"
    steps:
      - skill: hcls-pharma-genomics-single-cell-qc
        note: "> QC and filter scRNA-seq data"
      - skill: hcls-pharma-genomics-scvi-tools
        note: "> deep learning integration and batch correction"
      - platform: "machine-learning > register models in Snowflake ML Registry"

  - name: "Real-World Evidence Study"
    steps:
      - skill: hcls-provider-claims-data-analysis
        note: "> build cohorts from claims data"
      - skill: hcls-cross-cke-clinical-trials
        note: "> cross-reference with registered trials"
      - skill: hcls-provider-cdata-omop
        note: "> standardize to OMOP CDM"
      - skill: hcls-pharma-genomics-survival-analysis
        note: "> time-to-event outcomes analysis"
      - skill: hcls-cross-cke-pubmed
        note: "> validate findings against published literature"

  - name: "Clinical Trial Design"
    steps:
      - skill: hcls-cross-research-problem-selection
        note: "> validate research problem"
      - skill: hcls-cross-cke-clinical-trials
        note: "> search for similar/competing trials"
      - skill: hcls-cross-cke-pubmed
        note: "> review literature for evidence supporting study design"
      - skill: hcls-pharma-dsafety-clinical-trial-protocol
        note: "> generate protocol document"
      - skill: hcls-pharma-genomics-survival-analysis
        note: "> power analysis and endpoint design"

  - name: "Lab Data Modernization"
    steps:
      - skill: hcls-pharma-lab-allotrope
        note: "> standardize instrument outputs"
      - platform: "dynamic-tables > incremental pipeline for lab data"
      - platform: "developing-with-streamlit > lab analytics dashboard"

  - name: "Clinical Data Application (React)"
    steps:
      - note: "Domain skills > prepare backend data (FHIR, OMOP, imaging, claims)"
      - platform: "build-react-app > build React/Next.js app with Snowflake data"
      - platform: "deploy-to-spcs > deploy containerized app to SPCS"
      - platform: "data-policy > enforce PHI masking at the API layer"

  - name: "Clinical Document Intelligence"
    steps:
      - skill: hcls-provider-cdata-clinical-docs
        note: "> extract structured data from clinical documents (PDF, DOCX, images)"
      - skill: hcls-provider-cdata-clinical-nlp
        note: "> enrich with NER on extracted text fields"
      - skill: hcls-cross-cke-pubmed
        note: "> ground findings in biomedical literature"
      - skill: hcls-provider-cdata-fhir
        note: "> map extracted data to FHIR resources"
      - platform: "data-governance > PHI masking and row-access policies"
      - platform: "semantic-view-optimization > semantic views for analytics"
